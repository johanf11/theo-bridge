name: Provision Demo Viewer

on:
  workflow_dispatch:

jobs:
  provision-viewer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision viewer@caribbeanimport.demo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VIEWER_EMAIL: viewer@caribbeanimport.demo
          VIEWER_PASSWORD: ViewerDemo2026!
        run: |
          chmod +x scripts/provision-demo-viewer.sh
          ./scripts/provision-demo-viewer.sh
